name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  check-versions:
    name: Check version sync between Devbox and Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check versions
        run: |
          set -euo pipefail

          check_version() {
            local name="$1"
            shift

            declare -A versions
            while [[ $# -gt 0 ]]; do
              versions["$1"]="$2"
              shift 2
            done

            unique=$(printf '%s\n' "${versions[@]}" | sort -u | wc -l)
            if [[ "$unique" -ne 1 ]]; then
              echo "::error::${name} version mismatch detected:"
              for source in "${!versions[@]}"; do
                echo "  ${source}: ${versions[$source]}"
              done
              exit 1
            fi

            echo "All ${name} versions are consistent: ${versions[docker]}"
          }

          check_version "Python" \
            docker "$(grep -oP '(?<=FROM python:)[^-]+' Dockerfile | head -n 1)" \
            pyproject_toml "$(grep -oP '(?<=requires-python = "==)[^"]+' pyproject.toml)" \
            python_version_file "$(cat .python-version)"

          check_version "pnpm" \
            devbox "$(jq -r '.packages.pnpm' devbox.json)" \
            docker "$(grep -oP '(?<=FROM ghcr.io/pnpm/pnpm:)[^ @]+' Dockerfile | head -n 1)" \
            package_json "$(jq -r '.devEngines.packageManager.version' frontend/package.json | sed 's/[>=]//g')"

          check_version "uv" \
            devbox "$(jq -r '.packages.uv' devbox.json)" \
            docker "$(grep -oP '(?<=COPY --from=ghcr.io/astral-sh/uv:)[^ @]+' Dockerfile | head -n 1)"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Validate build configuration
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          call: check

      - name: Build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          push: false

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0

      - name: Set up uv
        run: devbox run -- uv sync --locked

      - name: Check formatting
        run: devbox run -- uv run ruff format --check

      - name: Lint
        run: devbox run -- uv run ruff check

      - name: Type check
        run: devbox run -- uv run mypy .

      - name: Check peer dependencies
        run: devbox run -- bash -c "cd frontend && pnpm peers check"

      - name: Install dependencies
        run: devbox run -- bash -c "cd frontend && pnpm install --frozen-lockfile"

      - name: Check TypeScript formatting
        run: devbox run -- bash -c "cd frontend && pnpm exec prettier --check ."

      - name: Lint TypeScript
        run: devbox run -- bash -c "cd frontend && pnpm exec eslint . --max-warnings 0"

      - name: Type check TypeScript
        run: devbox run -- bash -c "cd frontend && pnpm exec tsc -b --noEmit"
