# Pre-commit configuration
# Install: pre-commit install
# Update: pre-commit autoupdate

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Conventional commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Python formatting, linting, and type checking
  - repo: local
    hooks:
      - id: uv-lock
        name: uv lockfile check
        description: Check that the uv lockfile is up to date
        entry: devbox run -- uv lock --check
        language: system
        pass_filenames: false

      - id: ruff-check
        name: ruff check
        description: Lint Python files using ruff
        entry: devbox run -- uv run ruff check
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff format check
        description: Check Python file formatting using ruff
        entry: devbox run -- uv run ruff format --check
        language: system
        pass_filenames: false

      - id: mypy
        name: mypy type checker
        description: Type check Python files using mypy
        entry: devbox run -- uv run mypy .
        language: system
        pass_filenames: false

  # TypeScript formatting, linting, and type checking
  - repo: local
    hooks:
      - id: pnpm-peer-dependencies
        name: pnpm peer dependencies check
        description: Check that pnpm peer dependencies are satisfied
        entry: devbox run -- bash -c "cd frontend && pnpm install --no-lockfile --strict-peer-dependencies"
        language: system
        pass_filenames: false

      - id: pnpm-lock
        name: pnpm lockfile check
        description: Check that pnpm-lock.yaml is up to date
        entry: devbox run -- bash -c "cd frontend && pnpm install --frozen-lockfile"
        language: system
        pass_filenames: false

      - id: prettier
        name: Prettier code formatter
        description: Format TypeScript files using Prettier
        entry: devbox run -- bash -c "cd frontend && pnpm exec prettier --check ."
        language: system
        pass_filenames: false

      - id: eslint
        name: ESLint linter
        description: Lint TypeScript files using ESLint
        entry: devbox run -- bash -c "cd frontend && pnpm exec eslint . --max-warnings 0"
        language: system
        pass_filenames: false

      - id: tsc
        name: TypeScript type checker
        description: Type check TypeScript files using tsc
        entry: devbox run -- bash -c "cd frontend && pnpm exec tsc -b --noEmit"
        language: system
        pass_filenames: false
